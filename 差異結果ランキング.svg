<svg viewBox="0 0 720 372" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Segoe UI','Hiragino Sans','Meiryo',sans-serif">
<title>直近3カ月の差異（±絶対値）が大きかった社員 上位3名</title>
<desc>2026年3月・4月・5月それぞれで、勤怠と工数の差異（±絶対値）が大きかった社員の上位3名を横棒で示したランキング。時間は15分単位で切り捨てて比較。最長は2026年5月の42時間17分。</desc>
<style>
  .sh{font-size:15px;font-weight:700;fill:#111827}
  .note{font-size:12px;fill:#475467}
  .mlabel{font-size:15px;font-weight:700;fill:#1d4ed8}
  .rank{font-size:14px;font-weight:700;fill:#1a1a2e}
  .val{font-size:13px;font-weight:600;fill:#1a1a2e}
  .sep{stroke:#e2e8f0;stroke-width:1}
</style>

<text x="28" y="28" class="sh">直近3カ月 差異（±絶対値）が大きかった社員 上位3名</text>
<text x="28" y="46" class="note">勤怠（HRMOS）と工数（SUMTIME）の差異を確認した結果（15分単位切り捨て値を集計）</text>

<text x="30" y="106" class="mlabel">2026/03</text>
<text x="120" y="79" class="rank" text-anchor="middle">①</text>
<rect x="138" y="64" width="110" height="20" rx="6" fill="#1d4ed8"/>
