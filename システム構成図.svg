<text x="74" y="341" class="ts">認証情報</text>

<rect x="230" y="294" width="166" height="64" rx="8" class="hub"/>
<g transform="translate(240,313) scale(0.92)" fill="none" stroke="#1d4ed8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M13 3 5 13h5l-1 8 8-10h-5l1-8z"/></g>
<text x="270" y="322" class="th" fill="#15407a">Cloud Functions</text>
