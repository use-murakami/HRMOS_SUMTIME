<text x="350" y="233" class="ts">定期実行</text>

<rect x="34" y="300" width="152" height="54" rx="8" class="box"/>
<g class="ico" transform="translate(44,316) scale(0.92)"><circle cx="8" cy="9" r="4"/><path d="M11 12l7 7M16 17l2-2M18 19l2-2"/></g>
