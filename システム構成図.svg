<text x="550" y="196" class="ts">Entra ID アプリ</text>
<rect x="512" y="220" width="144" height="50" rx="8" class="box"/>
<g class="ico" transform="translate(520,234) scale(0.9)"><circle cx="6" cy="12" r="2.5"/><circle cx="17" cy="6" r="2.5"/><circle cx="17" cy="18" r="2.5"/><path d="M8.2 11l6.6-3.8M8.2 13l6.6 3.8"/></g>
<text x="550" y="241" class="th">Microsoft Graph</text>
<text x="550" y="258" class="ts">sendMail</text>
<rect x="512" y="282" width="144" height="50" rx="8" class="box"/>
<g class="ico" transform="translate(520,296) scale(0.9)"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></g>
<text x="550" y="303" class="th">メールボックス</text>
<text x="550" y="320" class="ts">共有（送信元）</text>

<rect x="512" y="346" width="144" height="86" rx="8" fill="#fffaf0" stroke="#f0c98a" stroke-width="1"/>
