</g>

<rect x="300" y="508" width="184" height="48" rx="8" fill="#eef2f7" stroke="#94a3b8" stroke-width="1.2"/>
<g class="ico" transform="translate(314,521) scale(0.9)"><circle cx="12" cy="8" r="3.5"/><path d="M5.5 20a6.5 6.5 0 0 1 13 0"/></g>
