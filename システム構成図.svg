<svg viewBox="0 0 850 584" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Segoe UI','Hiragino Sans','Meiryo',sans-serif">
<title>勤怠・工数突き合わせシステムの構成とデータの流れ</title>
<desc>社内ネットワーク（灰）・GCP（青）・外部SaaS（橙）の3エリアを背景色で層別し、各コンポーネントに種類を示すアイコンと処理順の番号付き矢印を重ねた構成図。外部SaaSにはHRMOS APIとMicrosoft（Azure AD・Graph・共有メールボックス）を含み、Azure登録情報も併記。</desc>
<style>
  .th{font-size:14px;font-weight:600;fill:#1a1a2e}
  .ts{font-size:12px;fill:#3f4a5c}
  .thc{font-size:17px;font-weight:700;fill:#111827}
  .tsc{font-size:12px;fill:#475467}
  .zlabel{font-size:14px;font-weight:700;fill:#334155}
  .box{fill:#ffffff;stroke:#cbd5e1;stroke-width:1}
  .hub{fill:#dbeafe;stroke:#1d4ed8;stroke-width:1.4}
  .arr{fill:none;stroke:#98a2b3;stroke-width:1.5;stroke-linecap:round}
  .alabel{font-size:12px;fill:#475467}
  .note{font-size:13px;fill:#1f2937}
  .nh{font-size:13px;font-weight:700;fill:#7c3a06}
  .ico{fill:none;stroke:#475467;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  .num{font-size:20px;font-weight:700;fill:#1d4ed8;paint-order:stroke;stroke:#ffffff;stroke-width:4;stroke-linejoin:round}
  .lgh{font-size:12px;font-weight:600;fill:#334155}
  .lg{font-size:15px;fill:#1f2937}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#98a2b3" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<text x="20" y="22" class="thc">勤怠・工数突き合わせシステム — 構成とデータの流れ</text>
<rect x="12" y="52" width="150" height="172" rx="8" fill="#ffffff" stroke="#1d4ed8" stroke-width="1.6"/>
<rect x="12" y="52" width="150" height="24" rx="8" fill="#1d4ed8"/>
<rect x="12" y="66" width="150" height="10" fill="#1d4ed8"/>
<text x="22" y="69" style="font-size:15px;font-weight:700;fill:#ffffff">処理の流れ</text>
<text x="22" y="98" class="lg">① 取得</text>
<text x="22" y="116" class="lg">② GCS保存</text>
<text x="22" y="134" class="lg">③ 起動</text>
<text x="22" y="152" class="lg">④ 取得 / 認証</text>
<text x="22" y="170" class="lg">⑤ メール送信</text>
<text x="22" y="188" class="lg">⑥ 保存</text>
<text x="22" y="206" class="lg">⑦ 手動実行</text>

<g transform="translate(150,0)">
<rect x="20" y="52" width="308" height="94" rx="10" fill="#eef2f7" stroke="#94a3b8" stroke-width="1.2"/>
