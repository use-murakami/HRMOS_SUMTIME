<svg viewBox="0 0 720 300" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Segoe UI','Hiragino Sans','Meiryo',sans-serif">
<title>勤怠と工数の突き合せ差異（全社合計・月別）</title>
<desc>勤怠（HRMOS）と工数（SUMTIME）との突き合せ差異の全社合計を月別に示した図。2026年3月33時間24分、4月40時間42分、5月67時間21分。15分単位で切り捨て、差異は±の絶対値を集計。</desc>
<style>
  .ttl{font-size:22px;font-weight:700;fill:#111827}
  .sub{font-size:18px;fill:#334155}
  .m{font-size:20px;font-weight:700;fill:#334155}
  .v{font-size:26px;font-weight:700;fill:#1f2937}
</style>
<rect x="0" y="0" width="720" height="300" fill="#ffffff"/>

<text x="28" y="38" class="ttl">勤怠（HRMOS）と工数（SUMTIME）との突き合せ</text>
<text x="28" y="68" class="sub">全社合計の差異（月別）　／　15分単位で切り捨て・差異は±の絶対値を集計</text>

<text x="28" y="127" class="m">2026/03</text>
<rect x="132" y="100" width="188" height="38" rx="6" fill="#3b82f6"/>
<text x="328" y="128" class="v">33時間24分</text>

<text x="28" y="197" class="m">2026/04</text>
<rect x="132" y="170" width="230" height="38" rx="6" fill="#3b82f6"/>
<text x="370" y="198" class="v">40時間42分</text>

<text x="28" y="267" class="m">2026/05</text>
<rect x="132" y="240" width="380" height="38" rx="6" fill="#3b82f6"/>
<text x="520" y="268" class="v">67時間21分</text>
</svg>
