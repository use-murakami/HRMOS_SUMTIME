<svg viewBox="0 0 960 376" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Segoe UI','Hiragino Sans','Meiryo',sans-serif">
<title>作成作業の時間を83%削減</title>
<desc>従来は1か月あたり60分（30分×2回）かかっていた報告書の作成作業が、導入後は10分（生成結果の確認5分×2回）になり、作業時間を83%削減した。</desc>
<style>
  .ttl{font-size:24px;font-weight:700;fill:#111827}
  .tag{font-size:22px;font-weight:700}
  .big{font-size:54px;font-weight:800}
  .det{font-size:24px;font-weight:700;fill:#1f2937}
  .hero{font-size:130px;font-weight:800;fill:#1d4ed8}
  .heroL{font-size:26px;font-weight:700;fill:#1f2937}
  .heroS{font-size:27px;font-weight:700;fill:#1f2937}
</style>
<rect x="0" y="0" width="960" height="376" fill="#ffffff"/>

<text x="40" y="48" class="ttl">作成作業の時間を大幅に削減</text>

<rect x="40" y="73" width="88" height="36" rx="18" fill="#e2e8f0"/>
<text x="84" y="99" class="tag" fill="#475467" text-anchor="middle">従来</text>
<text x="140" y="107" class="big" fill="#64748b" style="font-size:46px">60分 ／ 月</text>
<text x="42" y="150" class="det">30分/回 × 2回/月</text>
<rect x="42" y="164" width="430" height="30" rx="6" fill="#94a3b8"/>

<rect x="40" y="221" width="112" height="36" rx="18" fill="#dcfce7"/>
<text x="96" y="247" class="tag" fill="#15803d" text-anchor="middle">導入後</text>
<text x="164" y="264" class="big" fill="#16a34a" style="font-size:64px">10分 ／ 月</text>
<text x="42" y="298" class="det">5分/回（生成結果の確認） × 2回/月</text>
<rect x="42" y="312" width="72" height="30" rx="6" fill="#16a34a"/>

<line x1="560" y1="66" x2="560" y2="346" stroke="#e2e8f0" stroke-width="1"/>

<text x="752" y="222" class="hero" text-anchor="middle">83%</text>
<text x="752" y="266" class="heroL" text-anchor="middle">作業時間を削減</text>
<text x="752" y="300" class="heroS" text-anchor="middle">60分 → 10分 ／ 月</text>
</svg>
